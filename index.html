<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>実験教室 時計管理システム (同期版)</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --text-color: #222;
            --accent-color: #0056b3;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* --- スマホ・タブレット用レイアウト調整 --- */
        @media (max-width: 800px) {
            .container {
                flex-direction: column; /* 縦並び */
            }
            .left-panel {
                flex: none !important;
                border-right: none !important;
                border-bottom: 3px solid #ccc;
                padding: 20px 0;
                height: auto;
            }
            .right-panel {
                flex: none !important;
                height: auto;
                min-height: 400px;
            }
            #analog-clock {
                width: 320px !important;
                height: 320px !important;
            }
            #digital-clock {
                font-size: 4rem !important;
            }
            .time-display {
                font-size: 2.5rem !important;
            }
            .elapsed-display {
                font-size: 4rem !important;
            }
        }

        .left-panel {
            flex: 65; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 3px solid #ccc;
            background-color: var(--panel-bg);
        }

        #analog-clock {
            width: 450px;
            height: 450px;
            border: 12px solid #333;
            border-radius: 50%;
            position: relative;
            margin-bottom: 20px;
            background: #fff;
        }

        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 900;
            padding: 15px;
            box-sizing: border-box;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
        }
        .hour-hand { width: 14px; height: 120px; margin-left: -7px; background: #333; z-index: 3; }
        .min-hand { width: 8px; height: 170px; margin-left: -4px; background: #555; z-index: 2; }
        .sec-hand { width: 3px; height: 190px; margin-left: -1.5px; background: #ff0000; z-index: 4; }
        
        .center-pin {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        #digital-clock {
            font-size: 6rem;
            font-weight: bold;
            font-family: 'Monaco', monospace;
        }

        .right-panel {
            flex: 35;
            background-color: #eee;
            position: relative;
        }

        .panel-content {
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-box {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .label { font-size: 1.5rem; color: #555; margin-bottom: 10px; }
        .time-display { font-size: 3.5rem; font-weight: bold; color: #000; }
        .elapsed-display { font-size: 5rem; color: #000; font-weight: 900; }

        .settings-screen {
            background-color: #f0f0f0;
        }
        .settings-screen h2 { font-size: 2rem; margin-top: 0; }
        .input-group { margin-bottom: 30px; }
        .input-group label { display: block; font-size: 1.5rem; margin-bottom: 10px; }
        input[type="time"] { 
            width: 100%;
            font-size: 3rem; 
            padding: 10px; 
            border: 2px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .save-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }

        .save-btn:hover { background-color: #004494; }

        /* 常に画面右下に配置 */
        .toggle-area { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            z-index: 1000;
        }
        .hidden { display: none !important; }
        
        #toggle-btn {
            padding: 15px 25px;
            cursor: pointer;
            font-size: 1.5rem;
            border-radius: 40px;
            background: #333;
            color: #fff;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div id="analog-clock">
            <div id="numbers-container"></div>
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand min-hand" id="min-hand"></div>
            <div class="hand sec-hand" id="sec-hand"></div>
            <div class="center-pin"></div>
        </div>
        <div id="digital-clock">00:00:00</div>
    </div>

    <div class="right-panel">
        <div id="display-mode" class="panel-content">
            <div class="info-box">
                <div class="label">▶ 開始時間</div>
                <div class="time-display" id="display-start">--時--分</div>
                <div style="margin-top:20px;" class="label">■ 終了予定</div>
                <div class="time-display" id="display-end">--時--分</div>
            </div>

            <div class="info-box">
                <div class="label">経過時間</div>
                <div class="elapsed-display" id="display-elapsed">0分</div>
            </div>
        </div>

        <div id="settings-mode" class="panel-content settings-screen hidden">
            <h2>⚙ タイマー設定</h2>
            <div class="input-group">
                <label for="input-start">開始時間</label>
                <input type="time" id="input-start">
            </div>
            <div class="input-group">
                <label for="input-end">終了予定</label>
                <input type="time" id="input-end">
            </div>
            <button class="save-btn" onclick="saveSettings()">設定を保存して同期</button>
        </div>

        <div class="toggle-area">
            <button id="toggle-btn" onclick="toggleMode()">⚙ 設定</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- Firebaseの設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBF1Bx_P727FQOosw7nbU4IIZdluSawXcg",
        authDomain: "aiueo-88110.firebaseapp.com",
        projectId: "aiueo-88110",
        storageBucket: "aiueo-88110.firebasestorage.app",
        messagingSenderId: "654372886977",
        appId: "1:654372886977:web:d7c7cf53de0bd032763740",
        measurementId: "G-PLR078K42R"
    };

    // Firebaseの初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const timerDoc = doc(db, "settings", "timer");

    let startTimeStr = null;

    // 時計の数字描画
    window.setupClock = function() {
        const container = document.getElementById('numbers-container');
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.className = 'number';
            const angle = i * 30;
            num.style.transform = `rotate(${angle}deg)`;
            num.innerHTML = `<span style="display:inline-block; transform:rotate(-${angle}deg)">${i}</span>`;
            container.appendChild(num);
        }
    }

    // 時計の更新ループ
    window.updateClock = function() {
        const now = new Date();
        const s = now.getSeconds();
        const m = now.getMinutes();
        const h = now.getHours();
        document.getElementById('sec-hand').style.transform = `rotate(${s * 6}deg)`;
        document.getElementById('min-hand').style.transform = `rotate(${(m + s/60) * 6}deg)`;
        document.getElementById('hour-hand').style.transform = `rotate(${(h%12 + m/60) * 30}deg)`;
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('ja-JP', { hour12: false });

        if (startTimeStr) {
            const [sH, sM] = startTimeStr.split(':');
            const startDate = new Date();
            startDate.setHours(parseInt(sH), parseInt(sM), 0, 0);
            const diffMs = now - startDate;
            if (diffMs > 0) {
                const totalSeconds = Math.floor(diffMs / 1000);
                const mins = Math.floor(totalSeconds / 60);
                document.getElementById('display-elapsed').innerText = `${mins}分`;
            } else {
                document.getElementById('display-elapsed').innerText = "---";
            }
        }
    }

    // モード切替
    window.toggleMode = function() {
        const displayMode = document.getElementById('display-mode');
        const settingsMode = document.getElementById('settings-mode');
        const btn = document.getElementById('toggle-btn');
        if (displayMode.classList.contains('hidden')) {
            displayMode.classList.remove('hidden');
            settingsMode.classList.add('hidden');
            btn.innerText = "⚙ 設定";
        } else {
            displayMode.classList.add('hidden');
            settingsMode.classList.remove('hidden');
            btn.innerText = "× 戻る";
        }
    }

    // 表示フォーマット
    function formatToJapaneseTime(timeStr) {
        if (!timeStr) return "--時--分";
        const [h, m] = timeStr.split(':');
        return `${parseInt(h)}時${parseInt(m)}分`;
    }

    // 設定保存（Firebaseに送信）
    window.saveSettings = async function() {
        const s = document.getElementById('input-start').value;
        const e = document.getElementById('input-end').value;
        try {
            await setDoc(timerDoc, { startTime: s, endTime: e });
            toggleMode();
        } catch (err) {
            console.error("保存失敗:", err);
            alert("同期エラーが発生しました");
        }
    }

    // リアルタイム同期
    onSnapshot(timerDoc, (snapshot) => {
        if (snapshot.exists()) {
            const data = snapshot.data();
            startTimeStr = data.startTime;
            const endTimeStr = data.endTime;
            document.getElementById('display-start').innerText = formatToJapaneseTime(startTimeStr);
            document.getElementById('display-end').innerText = formatToJapaneseTime(endTimeStr);
        }
    });

    setupClock();
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
